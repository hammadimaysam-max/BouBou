<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Trello Turquoise</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f4f5f7;
    padding: 40px;
  }

  .trello-card {
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(9,30,66,0.25);
    width="900";
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
  }

  .trello-card:hover {
    box-shadow: 0 2px 6px rgba(9,30,66,0.4);
  }

  .card-cover {
    background: #17a2a2;
    height: 150px;
  }

  .card-content {
    padding: 12px;
  }

  .labels {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .label {
    background: #17a2a2;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-title {
    font-size: 14px;
    color: #172b4d;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #5e6c84;
    font-size: 12px;
  }

  .card-footer span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #17a2a2;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    margin-left: auto;
  }
</style>
</head>
<body>

  <div class="trello-card">
    <div class="card-cover"></div>
    <div class="card-content">
      <div class="labels">
        <span class="label">Design</span>
      </div>
      <div class="card-title">Créer les maquettes de la page d'accueil</div>
      <div class="card-footer">
        <span>📅 12 juil.</span>
        <span>💬 3</span>
        <span>📎 2</span>
        <div class="avatar">JD</div>
      </div>
    </div>
  </div>

</body>
</html>
